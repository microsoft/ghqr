- id: ghes-sec-001
  scope: ghes
  title: GitHub Advanced Security (GHAS) is not enabled on the GHES instance
  category: security
  severity: high
  description: The management API reports advanced_security_enabled=false. Without GHAS, code scanning, secret scanning, and dependency review are unavailable across all organisations on the appliance.
  recommendation: Enable GHAS to unlock code scanning, secret scanning, and dependency review across all organizations
  learnMore: https://docs.github.com/en/enterprise-server/admin/code-security/managing-github-advanced-security-for-your-enterprise/enabling-github-advanced-security-for-your-enterprise
  tags: [ghes, security, ghas]
  enabled: true

- id: ghes-sec-002
  scope: ghes
  title: Secret scanning is not enabled on the GHES instance
  category: security
  severity: high
  description: The management API observed secret_scanning_enabled=false. The corresponding API endpoint is reachable, so this is a real configuration gap rather than an unsupported feature.
  recommendation: Enable secret scanning to detect leaked credentials in repositories
  learnMore: https://docs.github.com/en/enterprise-server/admin/code-security/managing-github-advanced-security-for-your-enterprise/configuring-secret-scanning-for-your-appliance
  tags: [ghes, security, secret_scanning]
  enabled: true

- id: ghes-sec-003
  scope: ghes
  title: Secret scanning status could not be confirmed on this GHES instance
  category: security
  severity: info
  description: The /enterprises/secret-scanning/alerts endpoint did not respond. The setting reads as disabled but cannot be interpreted as a real misconfiguration without confirming the endpoint exists.
  recommendation: A non-2xx response can mean (a) the feature is not supported on this GHES version, (b) the feature exists but is not licensed or enabled at the appliance level, or (c) the scanning token lacks the required scope. Verify which case applies before treating this as a misconfiguration
  learnMore: https://docs.github.com/en/enterprise-server/admin/code-security/managing-github-advanced-security-for-your-enterprise/configuring-secret-scanning-for-your-appliance
  tags: [ghes, security, secret_scanning, unconfirmed]
  enabled: true

- id: ghes-sec-004
  scope: ghes
  title: Secret scanning push protection is not enabled
  category: security
  severity: high
  description: The management API observed secret_scanning_push_protection=false. Commits containing secrets can still be pushed to repositories before the alert fires.
  recommendation: Enable push protection to block commits containing secrets before they reach the repository
  learnMore: https://docs.github.com/en/enterprise-server/admin/code-security/managing-github-advanced-security-for-your-enterprise/configuring-secret-scanning-for-your-appliance
  tags: [ghes, security, secret_scanning, push_protection]
  enabled: true

